name: focus_os
description: Focus OS - Productivity Operating System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_local_notifications: ^16.3.0
  permission_handler: ^11.3.1
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  intl: ^0.18.1
  audioplayers: ^5.2.1
  lottie: ^3.1.0
  fl_chart: ^0.68.0
  http: ^1.2.0
  connectivity_plus: ^5.0.2
  flutter_foreground_task: ^8.4.0
  screen_pinning: ^1.0.0
  add_2_calendar: ^3.0.0
  device_apps: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/
    - assets/animations/
